version: '3.8'

services:
  # Training service - runs first to train the model
  train:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diabetes-train
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    command: python -m src.train
    environment:
      - PYTHONPATH=/app

  # API service - serves predictions
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diabetes-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      train:
        condition: service_completed_successfully
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "[localhost](http://localhost:8000/health)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: diabetes-network
